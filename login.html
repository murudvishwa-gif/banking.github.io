<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Stackly</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',Arial,sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(circle at top right,rgba(200,151,58,.25),transparent 30%),
    linear-gradient(135deg,#0A0F1E,#101933,#18244A);
  padding:20px;
}

.auth-card{
  width:100%;
  max-width:460px;
  padding:45px;
  border-radius:28px;
  background:rgba(255,255,255,.96);
  box-shadow:
    0 25px 60px rgba(0,0,0,.35),
    0 0 40px rgba(200,151,58,.18);
  animation:fadeUp .8s ease;
}

.brand{
  text-align:center;
  margin-bottom:25px;
}

.brand h2{
  font-size:2rem;
  font-weight:900;
  letter-spacing:1px;
  color:#0A0F1E;
}

.brand span{
  color:#C8973A;
}

h1{
  text-align:center;
  font-size:1.8rem;
  margin-bottom:10px;
  color:#0A0F1E;
}

.subtitle{
  text-align:center;
  color:#666;
  margin-bottom:30px;
}

.input-group{
  margin-bottom:18px;
}

.input-group label{
  display:block;
  margin-bottom:8px;
  color:#222;
  font-weight:600;
}

.input-group input{
  width:100%;
  padding:15px;
  border:1px solid #ddd;
  border-radius:14px;
  font-size:15px;
  transition:.3s;
}

.input-group input:focus{
  outline:none;
  border-color:#C8973A;
  box-shadow:0 0 0 4px rgba(200,151,58,.15);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
  font-size:14px;
  gap:10px;
}

.row label{
  display:flex;
  align-items:center;
  gap:7px;
  color:#555;
}

.row input{
  accent-color:#C8973A;
}

.row a{
  text-decoration:none;
  color:#C8973A;
  font-weight:700;
}

.login-btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:16px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  background:linear-gradient(135deg,#C8973A,#F0C060);
  color:#0A0F1E;
  transition:.3s;
}

.login-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 15px 30px rgba(200,151,58,.35);
}

.switch{
  text-align:center;
  margin-top:25px;
  color:#666;
}

.switch a{
  text-decoration:none;
  color:#C8973A;
  font-weight:700;
}

.home-btn{
  display:block;
  text-align:center;
  margin-top:20px;
  text-decoration:none;
  color:#0A0F1E;
  font-weight:700;
}

.home-btn:hover{
  color:#C8973A;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@media(max-width:480px){
  .auth-card{
    padding:30px 22px;
  }

  .brand h2{
    font-size:1.7rem;
  }

  h1{
    font-size:1.5rem;
  }

  .row{
    flex-direction:column;
    align-items:flex-start;
  }
}
</style>
</head>

<body>

<div class="auth-card">

  <div class="brand">
    <h2>STACK<span>LY</span></h2>
  </div>

  <h1>Welcome Back</h1>
  <p class="subtitle">Login to access your banking dashboard</p>

  <form>
    <div class="input-group">
      <label>Email Address</label>
      <input type="email" placeholder="Enter your email" required>
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" placeholder="Enter your password" required>
    </div>

    <div class="row">
      <label>
        <input type="checkbox">
        Remember me
      </label>

      <a href="404page.html">Forgot Password?</a>
    </div>

    <button class="login-btn" type="submit">Login Securely</button>
  </form>

  <div class="switch">
    Don't have an account?
    <a href="signup.html">Create Account</a>
  </div>

  <a href="index.html" class="home-btn">← Back to Home</a>

</div>

</body>
</html>
